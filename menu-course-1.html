<style id="responsive-fixes">
/* ITA Clone - Professional Mobile Responsive */

@media screen and (max-width: 979px) {
  html {
    overflow-x: hidden !important;
    overflow-y: auto !important;
    height: auto !important;
  }
  body {
    overflow-x: hidden !important;
    overflow-y: auto !important;
    height: auto !important;
  }
  
  #site-root {
    transform-origin: top left;
    /* Scale is set by JS */
  }
}

</style>
<script id="responsive-script">
// ITA Clone - Mobile responsive scaling
(function() {
  var SITE_WIDTH = 980;
  
  function applyMobileScale() {
    var vw = window.innerWidth;
    if (vw >= SITE_WIDTH) {
      // Desktop - remove any scaling
      var sr = document.getElementById('site-root');
      if (sr) {
        sr.style.transform = '';
        sr.style.width = '';
        sr.style.height = '';
      }
      document.body.style.minHeight = '';
      document.body.style.maxHeight = '';
      return;
    }
    
    var siteRoot = document.getElementById('site-root');
    if (!siteRoot) return;
    
    var scale = vw / SITE_WIDTH;
    var originalHeight = siteRoot.scrollHeight;
    var scaledHeight = Math.ceil(originalHeight * scale);
    
    // Apply transform scale
    siteRoot.style.transform = 'scale(' + scale + ')';
    siteRoot.style.transformOrigin = 'top left';
    siteRoot.style.width = SITE_WIDTH + 'px';
    
    // CRITICAL: Set the height of site-root's container to match scaled size
    // This prevents scrolling through empty space
    siteRoot.style.height = originalHeight + 'px';
    
    // Wrap in a container that clips to scaled height
    var wrapper = document.getElementById('mobile-scale-wrapper');
    if (!wrapper) {
      wrapper = document.createElement('div');
      wrapper.id = 'mobile-scale-wrapper';
      wrapper.style.overflow = 'hidden';
      wrapper.style.width = '100vw';
      siteRoot.parentNode.insertBefore(wrapper, siteRoot);
      wrapper.appendChild(siteRoot);
    }
    wrapper.style.height = scaledHeight + 'px';
    
    // Make sure body doesn't add extra scroll
    document.body.style.overflow = 'auto';
    document.documentElement.style.overflowX = 'hidden';
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      applyMobileScale();
      window.addEventListener('load', applyMobileScale);
    });
  } else {
    applyMobileScale();
    window.addEventListener('load', applyMobileScale);
  }
  
  window.addEventListener('resize', applyMobileScale);
  setTimeout(applyMobileScale, 2000);
  setTimeout(applyMobileScale, 5000);
})();

</script>
