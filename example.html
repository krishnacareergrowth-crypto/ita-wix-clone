<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page - Indian Transformation Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #355a82; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 60px 80px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .card h1 { font-size: 36px; color: #273347; margin-bottom: 15px; }
        .card h1 span { color: #FDB813; }
        .card p { font-size: 18px; color: #666; line-height: 1.6; margin-bottom: 30px; }
        .badge { display: inline-block; background: #04723D; color: white; padding: 12px 30px; border-radius: 50px; font-weight: 700; font-size: 14px; }
        .time { margin-top: 25px; font-size: 13px; color: #999; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 It <span>Works!</span></h1>
        <p>This is a test page created and deployed directly from GitHub. No Wix needed.</p>
        <div class="badge">✅ GitHub → Live in 30 seconds</div>
        <p class="time">Page created: March 11, 2026</p>
    </div>
</body>
</html>
